<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Mock image for mask test">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb703"/>
      <stop offset="50%" stop-color="#fb8500"/>
      <stop offset="100%" stop-color="#023047"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <circle cx="350" cy="260" r="180" fill="rgba(255,255,255,0.16)"/>
  <circle cx="1260" cy="760" r="220" fill="rgba(255,255,255,0.12)"/>
  <rect x="520" y="220" width="560" height="560" rx="48" fill="rgba(0,0,0,0.2)"/>

  <text x="800" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="900" fill="#ffffff">BURGER</text>
  <text x="800" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="82" font-weight="800" fill="#ffffff">TEST IMAGE</text>
  <text x="800" y="640" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="rgba(255,255,255,0.9)">MASK / ERASER PREVIEW</text>
</svg>
