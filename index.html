<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BurgersOnly</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-WPJT7ZCW');
  </script>
<!-- End Google Tag Manager -->
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WPJT7ZCW"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->
  <div class="app-shell">
    <header class="topbar">
      <div class="location-wrap">
        <span class="icon pin-icon" aria-hidden="true"></span>
        <p class="location-text">Kirchberg, Luxembourg</p>
      </div>
    </header>
    <button class="menu-btn" aria-label="Ouvrir les options burgers" aria-controls="optionsMenu" aria-expanded="false">
      <span class="menu-line"></span>
      <span class="menu-line"></span>
      <span class="menu-line"></span>
    </button>

    <aside id="optionsMenu" class="options-menu" aria-hidden="true">
      <div class="options-panel">
        <form class="options-form">
          <h2 class="options-title">Preferences alimentaires</h2>
          <section class="option-group" aria-label="Restrictions alimentaires">
            <div class="option-group-spacer" aria-hidden="true"></div>
            <label class="option-row"><input type="checkbox" name="burger_option" value="sans-gluten" />Sans gluten</label>
            <label class="option-row"><input type="checkbox" name="burger_option" value="sans-lactose" />Sans lactose</label>
          </section>

          <section class="option-group" aria-label="Religions">
            <div class="option-group-spacer" aria-hidden="true"></div>
            <label class="option-row"><input type="checkbox" name="burger_option" value="halal" />Halal</label>
            <label class="option-row"><input type="checkbox" name="burger_option" value="kasher" />Kasher</label>
          </section>

          <section class="option-group" aria-label="Sanitaire">
            <div class="option-group-spacer" aria-hidden="true"></div>
            <label class="option-row"><input type="checkbox" name="burger_option" value="sans-glyphosate" />Sans glyphosate</label>
            <label class="option-row"><input type="checkbox" name="burger_option" value="boeuf-sans-hormones" />Boeuf sans hormones</label>
            <label class="option-row"><input type="checkbox" name="burger_option" value="boeuf-local" />Boeuf local</label>
            <label class="option-row"><input type="checkbox" name="burger_option" value="sans-antibiotiques" />Sans antibiotiques</label>
            <label class="option-row"><input type="checkbox" name="burger_option" value="elevage-plein-air" />Elevage plein air</label>
          </section>
        </form>
      </div>
    </aside>

    <aside id="tileOverlay" class="tile-overlay" aria-hidden="true">
      <article id="tileExpander" class="tile tile-expander" aria-live="polite"></article>
      <button id="tileCloseBtn" class="tile-close-btn" aria-label="Fermer l'article">×</button>
    </aside>

    <aside id="infoReaderOverlay" class="info-reader-overlay" aria-hidden="true">
      <button id="infoReaderClose" class="info-reader-close" aria-label="Fermer l'article info">×</button>
      <article class="info-reader-panel" aria-live="polite">
        <h2 id="infoReaderTitle" class="info-reader-title"></h2>
        <div id="infoReaderBody" class="info-reader-body"></div>
      </article>
    </aside>

    <main class="views-viewport">
      <div class="views-track">
        <section id="restaurantsView" class="view active" aria-label="Restaurants">
          <div id="restaurantList" class="metro-grid" aria-live="polite"></div>
        </section>

        <section id="recipesView" class="view" aria-label="Recettes">
          <div id="recipeList" class="metro-grid" aria-live="polite"></div>
        </section>

        <section id="infosView" class="view" aria-label="Infos">
          <div id="infoList" class="info-list" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navigation principale">
      <div class="bottom-nav-track">
        <button class="nav-item active" data-view-target="restaurantsView" aria-current="page">
          <span class="nav-label">Restaurants</span>
        </button>
        <button class="nav-item" data-view-target="recipesView">
          <span class="nav-label">Recettes</span>
        </button>
        <button class="nav-item" data-view-target="infosView">
          <span class="nav-label">Infos</span>
        </button>
      </div>
    </nav>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
